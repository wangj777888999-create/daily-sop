<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>智能工作台 — 线框图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0EBE3; }
  select { appearance: none; outline: none; cursor: pointer; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── 设计令牌 ────────────────────────────────────────────────────────────────
const T = {
  pageBg:    '#F7F3EC',
  sidebar:   '#EDE7D9',
  aiPanel:   '#EAE4D6',
  topbar:    '#FEFCF8',
  border:    '#C4BAA8',
  textH:     '#3D3530',
  textB:     '#6B5F52',
  textL:     '#9C8E82',
  accent:    '#5B8F7A',   // sage green
  amber:     '#C17F3A',   // warm amber
  blue:      '#3A7FC1',
  purple:    '#7B6BAA',
  ph:        '#DDD6C8',   // placeholder
  phDk:      '#C8BFB0',
  white:     '#FEFCF8',
  chip:      '#E5DDD0',
  font:      "'Caveat', cursive",
};

const NAV = [
  { icon: '⌂', label: '工作台首页',   key: 'home'      },
  { icon: '◈', label: 'SOP 数据分析', key: 'sop'       },
  { icon: '✦', label: '政策报告撰写', key: 'policy'    },
  { icon: '◉', label: '高级数据分析', key: 'analytics' },
  { icon: '⬡', label: '数据库连接',   key: 'database'  },
  { icon: '◗', label: '个人知识库',   key: 'knowledge' },
];

// ─── 壳体组件 ────────────────────────────────────────────────────────────────
function Sidebar({ active }) {
  return (
    <div style={{ width: 220, background: T.sidebar, borderRight: `1px solid ${T.border}`, flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '18px 16px', borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ width: 34, height: 34, background: T.accent, borderRadius: 9, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 17, flexShrink: 0 }}>✦</div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.textH, lineHeight: 1.2 }}>智能工作台</div>
          <div style={{ fontSize: 10, color: T.textL }}>AI Workbench v2</div>
        </div>
      </div>
      <div style={{ flex: 1, padding: '10px 8px' }}>
        <div style={{ fontSize: 9, color: T.textL, padding: '4px 10px 6px', letterSpacing: 1 }}>主菜单</div>
        {NAV.map(item => {
          const on = active === item.key;
          return (
            <div key={item.key} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', borderRadius: 8, marginBottom: 2, background: on ? T.accent : 'transparent', color: on ? '#fff' : T.textB, fontSize: 13 }}>
              <span style={{ width: 16, textAlign: 'center', flexShrink: 0 }}>{item.icon}</span>
              <span>{item.label}</span>
              {on && <span style={{ marginLeft: 'auto', width: 6, height: 6, borderRadius: '50%', background: 'rgba(255,255,255,0.6)', flexShrink: 0 }} />}
            </div>
          );
        })}
      </div>
      <div style={{ padding: '12px 16px', borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 30, height: 30, borderRadius: '50%', background: T.phDk, flexShrink: 0 }} />
        <div>
          <div style={{ fontSize: 12, fontWeight: 600, color: T.textH }}>张三</div>
          <div style={{ fontSize: 10, color: T.textL }}>管理员</div>
        </div>
        <span style={{ marginLeft: 'auto', fontSize: 13, color: T.textL }}>⋯</span>
      </div>
    </div>
  );
}

function TopBar({ crumbs, actions }) {
  return (
    <div style={{ height: 52, background: T.topbar, borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', padding: '0 20px', gap: 12, flexShrink: 0 }}>
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 5, fontSize: 12 }}>
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <span style={{ color: T.border }}>/</span>}
            <span style={{ color: i === crumbs.length - 1 ? T.textH : T.textL }}>{c}</span>
          </React.Fragment>
        ))}
      </div>
      {actions && <div style={{ display: 'flex', gap: 6 }}>{actions}</div>}
      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <WChip>🔔</WChip>
        <WChip>⚙</WChip>
        <div style={{ width: 26, height: 26, borderRadius: '50%', background: T.phDk }} />
      </div>
    </div>
  );
}

function AIPanel() {
  return (
    <div style={{ width: 280, background: T.aiPanel, borderLeft: `1px solid ${T.border}`, flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '14px 16px', borderBottom: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 8, height: 8, borderRadius: '50%', background: T.accent }} />
        <span style={{ fontSize: 13, fontWeight: 700, color: T.textH }}>AI 助理</span>
        <div style={{ marginLeft: 'auto', fontSize: 10, background: '#D6EDE7', color: T.accent, padding: '2px 8px', borderRadius: 10, fontWeight: 700 }}>Claude</div>
      </div>
      <div style={{ flex: 1, padding: '12px', display: 'flex', flexDirection: 'column', gap: 8, overflow: 'hidden' }}>
        <AIMsg ai>你好！我是 AI 助理，随时可以帮你分析数据、撰写报告或解答问题。</AIMsg>
        <AIMsg>帮我分析这份数据的关键趋势</AIMsg>
        <AIMsg ai>好的，数据显示 Q3 同比增长 18%，华东区域贡献最大，以下是详细分析……</AIMsg>
        <div style={{ display: 'flex', gap: 3, padding: '2px 6px' }}>
          {[0,1,2].map(i => <div key={i} style={{ width: 5, height: 5, borderRadius: '50%', background: T.textL }} />)}
        </div>
      </div>
      <div style={{ padding: '8px 12px', borderTop: `1px solid ${T.border}` }}>
        <div style={{ fontSize: 10, color: T.textL, marginBottom: 5 }}>快捷操作</div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {['总结', '生成报告', '数据洞察', '提问'].map(t => (
            <div key={t} style={{ fontSize: 10, padding: '3px 8px', borderRadius: 10, background: T.chip, color: T.textB, border: `1px solid ${T.border}` }}>{t}</div>
          ))}
        </div>
      </div>
      <div style={{ padding: '10px 12px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: T.white, border: `1px solid ${T.border}`, borderRadius: 8, padding: '7px 10px' }}>
          <span style={{ flex: 1, fontSize: 11, color: T.textL }}>输入问题或指令…</span>
          <div style={{ width: 22, height: 22, borderRadius: 5, background: T.accent, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12 }}>↑</div>
        </div>
      </div>
    </div>
  );
}

function AIMsg({ ai, children }) {
  return (
    <div style={{
      background: ai ? T.white : T.accent,
      border: ai ? `1px solid ${T.border}` : 'none',
      borderRadius: ai ? '4px 10px 10px 10px' : '10px 4px 10px 10px',
      padding: '7px 10px', fontSize: 11, color: ai ? T.textB : '#fff',
      lineHeight: 1.5, maxWidth: '92%', alignSelf: ai ? 'flex-start' : 'flex-end',
    }}>{children}</div>
  );
}

function Shell({ page, crumbs, actions, children }) {
  return (
    <div style={{ display: 'flex', width: 1440, height: 900, background: T.pageBg, fontFamily: T.font, overflow: 'hidden' }}>
      <Sidebar active={page} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar crumbs={crumbs} actions={actions} />
        <div style={{ flex: 1, padding: '20px', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {children}
        </div>
      </div>
      <AIPanel />
    </div>
  );
}

// ─── 通用 WF 组件 ────────────────────────────────────────────────────────────
function WChip({ children, style }) {
  return <div style={{ padding: '4px 9px', borderRadius: 6, background: T.chip, border: `1px solid ${T.border}`, fontSize: 11, color: T.textB, display: 'inline-flex', alignItems: 'center', cursor: 'pointer', ...style }}>{children}</div>;
}

function WBtn({ label, primary, small, icon, style }) {
  return (
    <div style={{ padding: small ? '5px 11px' : '8px 18px', borderRadius: 8, fontSize: small ? 11 : 12, background: primary ? T.accent : T.chip, color: primary ? '#fff' : T.textB, border: `1px solid ${primary ? T.accent : T.border}`, display: 'inline-flex', alignItems: 'center', gap: 5, cursor: 'pointer', flexShrink: 0, ...style }}>
      {icon && <span>{icon}</span>}{label}
    </div>
  );
}

function WBox({ label, w, h, dashed, style, children }) {
  return (
    <div style={{ width: w, height: h, background: T.ph, border: `${dashed ? '1.5px dashed' : '1px solid'} ${T.border}`, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: T.textL, flexShrink: 0, ...style }}>
      {children || <span style={{ textAlign: 'center', padding: 8, lineHeight: 1.5 }}>{label}</span>}
    </div>
  );
}

function WCard({ style, children }) {
  return <div style={{ background: T.white, border: `1px solid ${T.border}`, borderRadius: 10, padding: '14px', ...style }}>{children}</div>;
}

function WRow({ label, action, style }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', marginBottom: 10, gap: 8, ...style }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: T.textH }}>{label}</div>
      {action && <div style={{ marginLeft: 'auto', fontSize: 11, color: T.accent, cursor: 'pointer' }}>{action}</div>}
    </div>
  );
}

function WMetric({ label, value, delta }) {
  return (
    <WCard style={{ flex: 1 }}>
      <div style={{ fontSize: 10, color: T.textL, marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: T.textH }}>{value}</div>
      {delta != null && <div style={{ fontSize: 10, color: delta >= 0 ? T.accent : T.amber, marginTop: 2 }}>{delta >= 0 ? '↑' : '↓'} {Math.abs(delta)}%</div>}
    </WCard>
  );
}

function WStep({ n, label, active, done }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '7px 12px', borderRadius: 8, background: active ? T.accent : done ? '#D6EDE7' : T.chip, border: `1px solid ${active ? T.accent : done ? T.accent : T.border}`, flexShrink: 0 }}>
      <div style={{ width: 20, height: 20, borderRadius: '50%', background: active ? '#fff' : done ? T.accent : T.phDk, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: active ? T.accent : done ? '#fff' : T.textL, fontWeight: 700, flexShrink: 0 }}>{done ? '✓' : n}</div>
      <span style={{ fontSize: 12, color: active ? '#fff' : T.textB, whiteSpace: 'nowrap' }}>{label}</span>
    </div>
  );
}

function WTable({ cols, rows }) {
  return (
    <div style={{ border: `1px solid ${T.border}`, borderRadius: 8, overflow: 'hidden', fontSize: 11 }}>
      <div style={{ display: 'flex', background: T.chip, borderBottom: `1px solid ${T.border}` }}>
        {cols.map((c, i) => <div key={i} style={{ flex: 1, padding: '7px 10px', color: T.textB, fontWeight: 700 }}>{c}</div>)}
      </div>
      {Array.from({ length: rows }).map((_, ri) => (
        <div key={ri} style={{ display: 'flex', borderBottom: ri < rows - 1 ? `1px solid ${T.border}` : 'none', background: ri % 2 === 0 ? T.white : T.pageBg }}>
          {cols.map((_, ci) => (
            <div key={ci} style={{ flex: 1, padding: '6px 10px' }}>
              <div style={{ height: 10, background: T.ph, borderRadius: 3, width: ci === 0 ? '65%' : '45%' }} />
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function Divider() {
  return <div style={{ flex: 1, height: 1, background: T.border, opacity: 0.6, alignSelf: 'center' }} />;
}

// ─── 首页 A: 服务卡片网格 ────────────────────────────────────────────────────
function HomeA() {
  const services = [
    { icon: '◈', name: 'SOP 数据分析', desc: '上传数据→选择 SOP→自动分析→生成报告', color: T.accent, tag: '常用' },
    { icon: '✦', name: '政策报告撰写', desc: 'AI 辅助主题设定、大纲生成与内容撰写', color: T.amber, tag: '新' },
    { icon: '◉', name: '高级数据分析', desc: '复杂统计、可视化图表、预测建模', color: T.purple, tag: '' },
    { icon: '⬡', name: '数据库连接', desc: '连接 PostgreSQL / MySQL / SQLite', color: T.blue, tag: '' },
    { icon: '◗', name: '个人知识库', desc: '文档管理、语义检索、RAG 增强', color: '#8A6F3A', tag: '' },
    { icon: '+', name: '即将推出',     desc: '更多功能模块正在开发中…', color: T.textL, tag: '' },
  ];
  return (
    <Shell page="home" crumbs={['工作台', '首页']}>
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700, color: T.textH }}>早上好，张三 👋</div>
          <div style={{ fontSize: 13, color: T.textL, marginTop: 2 }}>今天有 3 项任务待处理</div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          <WBtn label="查看任务" icon="📋" />
          <WBtn label="新建分析" primary icon="＋" />
        </div>
      </div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
        <WMetric label="本月分析次数" value="42" delta={12} />
        <WMetric label="生成报告" value="8" delta={5} />
        <WMetric label="知识库文档" value="126" />
        <WMetric label="本周使用时长" value="18h" />
      </div>
      <WRow label="核心功能入口" />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, flex: 1 }}>
        {services.map((s, i) => (
          <WCard key={i} style={{ cursor: 'pointer', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
              <div style={{ width: 42, height: 42, borderRadius: 11, background: s.color + '22', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, color: s.color }}>{s.icon}</div>
              {s.tag && <div style={{ fontSize: 9, padding: '2px 7px', borderRadius: 10, background: s.color + '22', color: s.color, fontWeight: 700 }}>{s.tag}</div>}
            </div>
            <div style={{ fontSize: 14, fontWeight: 700, color: T.textH }}>{s.name}</div>
            <div style={{ fontSize: 11, color: T.textL, lineHeight: 1.5 }}>{s.desc}</div>
            <div style={{ marginTop: 'auto', fontSize: 11, color: s.color, fontWeight: 600 }}>立即使用 →</div>
          </WCard>
        ))}
      </div>
    </Shell>
  );
}

// ─── 首页 B: 仪表盘概览 ───────────────────────────────────────────────────────
function HomeB() {
  return (
    <Shell page="home" crumbs={['工作台', '首页 — 仪表盘']}>
      <div style={{ display: 'flex', gap: 16, flex: 1, minHeight: 0 }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 14, minWidth: 0 }}>
          <div style={{ display: 'flex', gap: 10 }}>
            <WMetric label="本月分析次数" value="42" delta={12} />
            <WMetric label="报告生成" value="8" delta={5} />
            <WMetric label="知识库文档" value="126" />
          </div>
          <WCard style={{ flex: 1 }}>
            <WRow label="使用趋势" action="切换周期 ▾" />
            <WBox label="折线图 + 柱状图 — 近 7 天各模块使用量" w="100%" h={160} dashed />
          </WCard>
          <WCard>
            <WRow label="近期任务" action="查看全部" />
            {['SOP 分析 — 销售数据 Q3', '政策报告 — 数字经济政策研究', '数据库查询 — 用户行为分析'].map((t, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: i < 2 ? `1px solid ${T.border}` : 'none' }}>
                <div style={{ width: 7, height: 7, borderRadius: '50%', background: [T.accent, T.amber, T.purple][i], flexShrink: 0 }} />
                <span style={{ flex: 1, fontSize: 12, color: T.textB }}>{t}</span>
                <span style={{ fontSize: 10, color: T.textL }}>2 小时前</span>
                <WChip style={{ fontSize: 10 }}>继续</WChip>
              </div>
            ))}
          </WCard>
        </div>
        <div style={{ width: 256, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <WCard>
            <WRow label="快速入口" />
            {[['◈','新建 SOP 分析'],['✦','撰写政策报告'],['⬡','连接数据库'],['◗','上传知识文档']].map(([icon, a], i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', borderBottom: i < 3 ? `1px solid ${T.border}` : 'none', cursor: 'pointer' }}>
                <div style={{ width: 28, height: 28, borderRadius: 6, background: T.chip, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, flexShrink: 0 }}>{icon}</div>
                <span style={{ fontSize: 12, color: T.textB }}>{a}</span>
                <span style={{ marginLeft: 'auto', color: T.textL }}>→</span>
              </div>
            ))}
          </WCard>
          <WCard style={{ flex: 1 }}>
            <WRow label="本周日历" />
            <WBox label="迷你日历组件" w="100%" h={120} dashed />
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 10, color: T.textL, marginBottom: 6 }}>今日日程</div>
              {['10:00  数据汇报准备', '14:30  政策文稿审核'].map((e, i) => (
                <div key={i} style={{ fontSize: 11, color: T.textB, padding: '5px 0', borderBottom: i < 1 ? `1px dashed ${T.border}` : 'none', display: 'flex', gap: 6 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.accent, flexShrink: 0, marginTop: 4 }} />{e}
                </div>
              ))}
            </div>
          </WCard>
        </div>
      </div>
    </Shell>
  );
}

// ─── SOP A: 步骤向导 ─────────────────────────────────────────────────────────
function SopA() {
  return (
    <Shell page="sop" crumbs={['工作台', 'SOP 分析', '新建分析']}>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 20 }}>
        <WStep n={1} label="上传数据" done />
        <Divider />
        <WStep n={2} label="选择 SOP" active />
        <Divider />
        <WStep n={3} label="配置参数" />
        <Divider />
        <WStep n={4} label="生成报告" />
      </div>
      <div style={{ display: 'flex', gap: 14, flex: 1, minHeight: 0 }}>
        <WCard style={{ width: 272, display: 'flex', flexDirection: 'column' }}>
          <WRow label="SOP 模板库" />
          <div style={{ background: T.pageBg, border: `1px solid ${T.border}`, borderRadius: 6, padding: '6px 10px', marginBottom: 10, fontSize: 11, color: T.textL }}>🔍 搜索模板…</div>
          {['销售数据分析', '财务报表分析', '运营指标分析', '用户行为分析', '供应链分析'].map((t, i) => (
            <div key={i} style={{ padding: '9px 11px', borderRadius: 8, marginBottom: 5, cursor: 'pointer', background: i === 1 ? T.accent : T.pageBg, border: `1px solid ${i === 1 ? T.accent : T.border}`, fontSize: 12, color: i === 1 ? '#fff' : T.textB, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              {t}
              {i === 1 && <span style={{ fontSize: 10, background: 'rgba(255,255,255,0.25)', padding: '1px 6px', borderRadius: 8 }}>已选</span>}
            </div>
          ))}
        </WCard>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 14, minWidth: 0 }}>
          <WCard>
            <WRow label="财务报表分析 SOP" />
            <div style={{ fontSize: 11, color: T.textL, marginBottom: 10, lineHeight: 1.5 }}>适用于月度/季度财务报表，自动计算关键指标并生成分析摘要</div>
            <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
